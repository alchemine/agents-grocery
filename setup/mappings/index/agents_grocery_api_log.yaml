index_template:
  name: agents_grocery_api_log_template
  body:
    index_patterns: ["agents_grocery_api_log-*"]
    template:
      settings:
        number_of_shards: 1
        number_of_replicas: 1
        index.lifecycle.name: log_policy
        index.lifecycle.rollover_alias: agents_grocery_api_log

index:
  name: agents_grocery_api_log-000001
  body:
    aliases:
      agents_grocery_api_log:
        is_write_index: true
