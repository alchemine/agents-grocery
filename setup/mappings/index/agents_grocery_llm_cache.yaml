    index_patterns: ["agents_grocery_llm_cache-*"]
    template:
      settings:
        number_of_shards: 1
        number_of_replicas: 1
        index.lifecycle.name: inference_cache_policy
        index.lifecycle.rollover_alias: agents_grocery_llm_cache

index:
  name: agents_grocery_llm_cache-000001
  body:
    aliases:
      agents_grocery_llm_cache:
        is_write_index: true
