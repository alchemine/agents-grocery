api:
  port: 8000
  workers: 1

inference:
  llm:
    providers:
      # https://platform.openai.com/docs/models
      # https://platform.openai.com/docs/guides/latest-model
      # https://platform.openai.com/docs/guides/reasoning#reasoning-summaries
      openai_fast:
        model_config:
          model: gpt-4o-mini # $0.15 / $0.60
          # model: gpt-4.1-nano  # $0.10 / $0.40
          # model: gpt-4.1-mini  # $0.40 / $1.60
          # model: gpt-4.1       # $2.00 / $8.00
          # model: gpt-5-nano    # $0.05 / $0.40
          # model: gpt-5         # $1.25 / $10.00
          # model: gpt-5-mini # $0.25 / $2.00
          # temperature: 0       # only for gpt-5-chat
          max_tokens: 8192
          # reasoning:
          #   effort: minimal # minimal, low, medium(default), high
          #   summary: null # null(default), detailed, auto(detailed or more)
          # model_kwargs:
          #   text:
          #     verbosity: low # low, medium(default), high
        max_concurrency: 16

      openai:
        model_config:
          model: gpt-5-mini
          max_tokens: 8192
          reasoning:
            effort: medium # minimal, low, medium(default), high
            summary: null # null(default), detailed, auto(detailed or more)
          model_kwargs:
            text:
              verbosity: medium # low, medium(default), high
        max_concurrency: 16

      tpu:
        model_config:
          openai_api_base: http://TPU_IP:8000/v1
          model: /workspace/naver-14b-local/
          temperature: 0.5
          max_tokens: 8192
          stop: ["<|im_end|><|endofturn|>", "<|im_end|><|stop|>"]
          n: 1
          extra_body:
            skip_special_tokens: false
            repetition_penalty: 1.05
            top_k: -1
            chat_template_kwargs:
              skip_reasoning: true
        max_concurrency: 16
      tpu_virtual_client:
        model_config:
          openai_api_base: http://localhost:8000/v1
          openai_api_key: empty
          model: /workspace/client-15b-local/
          temperature: 0.5
          max_tokens: 8192
          extra_body:
            skip_special_tokens: false
            repetition_penalty: 1.05
            top_k: -1
            top_p: 1
            chat_template_kwargs:
              skip_reasoning: true
        max_concurrency: 16

  embeddings:
    provider: local
    providers:
      local:
        model_config:
          api_key: empty
          openai_api_base: http://EMBEDDING_IP:8000/v1
          model: dragonkue/snowflake-arctic-embed-l-v2.0-ko
        dimensions: 1024
