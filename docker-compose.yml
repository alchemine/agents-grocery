x-common: &common
  build:
    args: &common-build-args
      ENV: dev
      UID: ${UID}
  env_file: .env
  user: ${UID}
  restart: always

services:
  init:
    <<: *common
    profiles:
      - init
    image: agrocery/setup:0.1.0
    build:
      context: setup
      args:
        <<: *common-build-args
    container_name: agrocery-init
    hostname: agrocery-init
    restart: no
    command: ["python", "/app/src/initialize.py"]

  clean:
    <<: *common
    profiles:
      - clean
    image: agrocery/setup:0.1.0
    build:
      context: setup
      args:
        <<: *common-build-args
    container_name: agrocery-clean
    hostname: agrocery-clean
    restart: no
    command: ["python", "/app/src/clean.py"]

  agents:
    <<: *common
    image: agrocery/agents:0.1.0
    build:
      context: agents
      args:
        <<: *common-build-args
    container_name: agrocery-agents
    hostname: agrocery-agents
    ports:
      - 20000:8000
    volumes:
      # Dev mode
      - ./agents:/app

  view:
    <<: *common
    image: agrocery/view:0.1.0
    build:
      context: view
      args:
        <<: *common-build-args
    container_name: agrocery-view
    hostname: agrocery-view
    environment:
      STREAMLIT_SERVER_RUN_ON_SAVE: true
    ports:
      - 30000:8501
    volumes:
      # Dev mode
      - ./view:/app

networks:
  default:
    name: agrocery
